<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Grabando pantalla</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #1e1e2e;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      user-select: none;
    }
    .dot {
      width: 12px;
      height: 12px;
      background: #e53935;
      border-radius: 50%;
      animation: blink 1s infinite;
      margin-bottom: 8px;
    }
    @keyframes blink { 50% { opacity: 0.3; } }
    #timer {
      font-size: 32px;
      font-variant-numeric: tabular-nums;
      margin: 4px 0;
    }
    #status { font-size: 12px; color: #aaa; margin-bottom: 12px; }
    button {
      padding: 8px 20px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #e53935;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #c62828; }
  </style>
</head>
<body>
  <div class="dot"></div>
  <div id="timer">00:00</div>
  <div id="status">Iniciando...</div>
  <button id="stop">Detener grabacion</button>
  <script src="recorder.js"></script>
</body>
</html>
